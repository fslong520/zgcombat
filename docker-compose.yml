version: '3'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - 27017:27017

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - 6379:6379

  proxy:
    build:
      context: .
      dockerfile: ./development/docker/Dockerfile
    command: bash -c "npm install && npm run proxy"
    volumes:
      - .:/coco
      - /coco/node_modules
    environment:
      DEV_CONTAINER: 1
      COCO_MONGO_HOST: mongo
      COCO_MONGO_PORT: 27017
      COCO_MONGO_DB: codecombat
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - 7777:3000
    depends_on:
      - mongo
      - redis

volumes:
  mongo-data:
