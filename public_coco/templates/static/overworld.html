// Prevent SPA from navigating to old homepage
(function() {
  function shouldRedirect(url) {
    return url === '/' || url === '/home' || url === '';
  }
  var origPush = history.pushState;
  history.pushState = function(data, title, url) {
    if (url && shouldRedirect(url)) {
      window.location.href = '/play';
      return;
    }
    return origPush.call(this, data, title, url);
  };
  var origReplace = history.replaceState;
  history.replaceState = function(data, title, url) {
    if (url && shouldRedirect(url)) {
      window.location.href = '/play';
      return;
    }
    return origReplace.call(this, data, title, url);
  };
})();
// Also intercept clicks on links to / and /home
document.addEventListener('click', function(e) {
  var a = e.target.closest('a');
  if (a) {
    var href = a.getAttribute('href');
    if (href === '/' || href === '/home') {
      e.preventDefault();
      window.location.href = '/play';
    }
  }
}, true);
