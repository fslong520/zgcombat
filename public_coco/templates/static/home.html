<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ZGCombat - 编程游戏</title><link rel="stylesheet" href="/dev/stylesheets/app.css"><script src="/dev/javascripts/app.js" defer async data-ace-base="/javascripts/ace"></script><script src="/user-data?sha=dev"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;font-family:"Open Sans","Microsoft YaHei",sans-serif;min-height:100vh}
.header{background:rgba(0,0,0,.3);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.header .logo{font-size:22px;font-weight:700;color:#5cb85c;text-decoration:none}
.header .logo span{color:#fff}
.header .nav a{color:#b8a9d4;text-decoration:none;margin-left:24px;font-size:14px}
.header .nav a:hover{color:#fff}
.hero{text-align:center;padding:100px 20px 60px}
.hero h1{font-size:56px;font-weight:700;margin-bottom:12px;background:linear-gradient(135deg,#5cb85c,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:20px;color:#b8a9d4;margin-bottom:48px;max-width:560px;margin-left:auto;margin-right:auto}
.btn-play{display:inline-block;padding:18px 72px;font-size:22px;font-weight:700;background:linear-gradient(135deg,#5cb85c,#4ecdc4);color:#fff;border-radius:50px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 32px rgba(92,184,92,.3)}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(92,184,92,.4)}
.campaigns{max-width:900px;margin:60px auto 40px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.campaign-card{background:rgba(255,255,255,.08);border-radius:16px;padding:28px;text-align:center;transition:background .2s,transform .2s;text-decoration:none;color:#fff;display:block;backdrop-filter:blur(5px)}
.campaign-card:hover{background:rgba(255,255,255,.14);transform:translateY(-4px)}
.campaign-card .icon{font-size:40px;margin-bottom:12px}
.campaign-card h3{font-size:18px;margin-bottom:6px;font-weight:600}
.campaign-card p{font-size:13px;color:#b8a9d4;line-height:1.5}
.footer{text-align:center;padding:40px;color:#666;font-size:13px}
.footer a{color:#5cb85c;text-decoration:none}
</style></head><body>
<div class="header">
  <a class="logo" href="/">Code<span>Combat</span></a>
  <div class="nav">
    <a href="/play">游戏</a>
    <a href="/play/dungeon">地牢</a>
    <a href="/play/forest">森林</a>
    <a href="/play/desert">沙漠</a>
  </div>
</div>
<div class="hero">
  <h1>编程游戏</h1>
  <p>通过闯关学习 Python 和 JavaScript 编程。适合所有年龄段，从零开始。</p>
  <a class="btn-play" href="/play">开始游戏</a>
</div>
<div class="campaigns">
  <a class="campaign-card" href="/play/dungeon">
    <div class="icon">🏰</div>
    <h3>Kithgard 地牢</h3>
    <p>从最基础的移动和攻击开始，逐步掌握编程思维</p>
  </a>
  <a class="campaign-card" href="/play/forest">
    <div class="icon">🌲</div>
    <h3>Backwoods 森林</h3>
    <p>学习循环和条件判断，应对更复杂的敌人</p>
  </a>
  <a class="campaign-card" href="/play/desert">
    <div class="icon">🏜️</div>
    <h3>Sarven 沙漠</h3>
    <p>掌握变量和函数，挑战更强的对手</p>
  </a>
  <a class="campaign-card" href="/play/mountain">
    <div class="icon">⛰️</div>
    <h3>Cloudrip 山巅</h3>
    <p>探索高级编程概念，成为编程大师</p>
  </a>
</div>
<div class="footer">
  ZGCombat · 内部学习版本 · <a href="https://github.com/codecombat/codecombat">开源项目</a>
</div>
</body></html>
