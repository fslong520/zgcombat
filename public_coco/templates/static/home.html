<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZGCombat - 编程学习平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:#0d0e1f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.header{background:rgba(13,14,31,.95);border-bottom:1px solid rgba(255,255,255,.06);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header .logo{font-size:20px;font-weight:800;color:#5cb85c;text-decoration:none;font-family:"JetBrains Mono","Fira Code",monospace}
.header .logo span{color:#e0e0e0}
.header .nav{display:flex;align-items:center;gap:4px}
.header .nav a{padding:6px 16px;color:#8888aa;text-decoration:none;font-size:13px;border-radius:8px;transition:all .15s}
.header .nav a:hover{color:#e0e0e0;background:rgba(255,255,255,.06)}
.header .nav .btn-reg{padding:6px 20px;background:#5cb85c;color:#fff!important;border-radius:8px;font-weight:600}
.header .nav .btn-reg:hover{background:#4cae4c;transform:translateY(-1px)}
.hero{background:linear-gradient(160deg,#0d0e1f 0%,#1a1b2e 50%,#0d0e1f 100%);padding:80px 32px 60px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(92,184,92,.06) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;position:relative;z-index:1}
.hero-text h1{font-size:40px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:10px}
.hero-text h1 span{color:#5cb85c}
.hero-text p{font-size:14px;color:#8888aa;line-height:1.7;margin-bottom:24px;max-width:440px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{padding:12px 36px;font-size:15px;font-weight:700;background:#5cb85c;color:#fff!important;border-radius:10px;text-decoration:none;transition:all .15s}
.btn-primary:hover{transform:translateY(-1px);background:#4cae4c;box-shadow:0 4px 20px rgba(92,184,92,.3)}
.btn-secondary{padding:12px 32px;font-size:15px;font-weight:600;color:#e0e0e0!important;border-radius:10px;text-decoration:none;border:1px solid rgba(255,255,255,.12);transition:all .15s}
.btn-secondary:hover{background:rgba(255,255,255,.06)}
.code-block{background:#0a0b16;border-radius:12px;border:1px solid rgba(255,255,255,.06);overflow:hidden}
.code-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.04)}
.code-dot{width:10px;height:10px;border-radius:50%}
.code-dot.r{background:#ff5f57}
.code-dot.y{background:#ffbd2e}
.code-dot.g{background:#28c840}
.code-file{font-size:11px;color:#8888aa;font-family:"JetBrains Mono","Fira Code",monospace;margin-left:10px}
.code-body{padding:14px 18px;font-family:"JetBrains Mono","Fira Code",monospace;font-size:13px;line-height:1.8;overflow-x:auto}
.code-body .kw{color:#c678dd}
.code-body .fn{color:#61afef}
.code-body .str{color:#98c379}
.lang-bar{display:flex;justify-content:center;gap:12px;padding:20px 32px;flex-wrap:wrap}
.lang-tag{display:flex;align-items:center;gap:6px;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:600;font-family:"JetBrains Mono","Fira Code",monospace}
.lang-tag.py{background:rgba(92,184,92,.1);color:#5cb85c;border:1px solid rgba(92,184,92,.2)}
.lang-tag.cpp{background:rgba(198,120,221,.1);color:#c678dd;border:1px solid rgba(198,120,221,.2)}
.lang-tag.js{background:rgba(229,192,123,.1);color:#e5c07b;border:1px solid rgba(229,192,123,.2)}
.lang-tag .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.lang-tag.py .dot{background:#5cb85c}
.lang-tag.cpp .dot{background:#c678dd}
.lang-tag.js .dot{background:#e5c07b}
.cta{text-align:center;padding:60px 32px 80px}
.cta h2{font-size:26px;font-weight:700;color:#fff;margin-bottom:6px}
.cta p{font-size:14px;color:#8888aa;margin-bottom:24px}
.footer{text-align:center;padding:24px 32px;color:#555;font-size:12px;border-top:1px solid rgba(255,255,255,.04)}
.footer a{color:#5cb85c;text-decoration:none}
@media(max-width:768px){.hero-inner{grid-template-columns:1fr;gap:24px;padding-top:30px}.hero-text h1{font-size:28px}.header{padding:0 16px}.header .nav a{padding:4px 10px;font-size:12px}}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="/">ZG<span>Combat</span></a>
  <div class="nav">
    <a href="/play">进入游戏</a>
    <a href="/play">注册</a>
    <a href="/play">登录</a>
  </div>
</div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>编程 <span>即力量</span></h1>
      <p>在冒险中学习 Python、JavaScript 和 C++。闯关解锁新地图，从零开始逐步进阶。</p>
      <div class="hero-btns">
        <a class="btn-primary" href="/play">开始冒险</a>
        <a class="btn-secondary" href="/play/dungeon">试玩第一关</a>
      </div>
    </div>
    <div class="code-block">
      <div class="code-header">
        <span class="code-dot r"></span><span class="code-dot y"></span><span class="code-dot g"></span>
        <span class="code-file">kithgard.py</span>
      </div>
      <div class="code-body">
        <span class="kw">while</span> <span class="fn">canAttack</span>(<span class="str">"ogre"</span>):<br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">attack</span>(<span class="str">"ogre"</span>)<br>
        <span class="fn">moveRight</span>()<br>
        <span class="fn">moveRight</span>()<br>
        <span class="fn">moveRight</span>()<br>
        <span class="fn">moveUp</span>()
      </div>
    </div>
  </div>
</div>
<div class="lang-bar">
  <div class="lang-tag py"><span class="dot"></span> Python</div>
  <div class="lang-tag cpp"><span class="dot"></span> C++</div>
  <div class="lang-tag js"><span class="dot"></span> JavaScript</div>
</div>
<div class="cta">
  <h2>准备好开始了吗？</h2>
  <p>地图逐步解锁，完成关卡才能前进。支持三种编程语言。</p>
  <a class="btn-primary" href="/play">进入游戏</a>
</div>
<div class="footer">
  ZGCombat · <a href="https://github.com/codecombat/codecombat" target="_blank">开源项目</a>
</div>
</body></html>
